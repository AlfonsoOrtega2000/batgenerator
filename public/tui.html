<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimizalo — Herramientas</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0C0C0C;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 15px;
  overflow-x: auto;
}
#terminal { display: flex; flex-direction: column; outline: none; cursor: default; user-select: none; }
.row      { display: flex; align-items: stretch; flex-shrink: 0; }
.blue     { background: #0037DA; color: #fff; white-space: pre; overflow: hidden; flex-shrink: 0; line-height: 1.5; }
.selected { background: #3B78FF; color: #fff; font-weight: bold; white-space: pre; overflow: hidden; flex-shrink: 0; line-height: 1.5; }
.box      { display: flex; flex-direction: column; border: 1px solid rgba(200,225,255,0.85); }
@media (max-width: 600px) { body { font-size: 10px; } }
</style>
</head>
<body>
<div id="terminal" tabindex="0"></div>
<script>
// ── Constants ─────────────────────────────────────────────────────────────────
const BOX_WIDTH = 54;
const API_URL   = '/api/generate';
const AUTH_URL  = '/api/auth';
const VERSION   = 'v0.1.2';
const SPINNER   = ['|', '/', '-', '\\'];

const STEP_KEYS   = ['crear_carpeta','compartir_red','visible_red','acceso_directo','copiar_archivos','ejecutar_comando'];
const STEP_LABELS = ['Crear carpeta','Compartir en red','Visibilidad en red','Acceso directo escritorio','Copiar archivos','Ejecutar comando'];
const STEP_DESCS  = [
  'Crea la carpeta en el disco si no existe ya',
  'Comparte la carpeta en la red local (acceso total)',
  'Activa el descubrimiento de red y uso compartido',
  'Crea un acceso directo a la carpeta en el escritorio',
  'Copia archivos de una ruta origen a una ruta destino',
  'Ejecuta un comando personalizado de Windows',
];
const STEP_COUNT  = STEP_KEYS.length;

const IDX_COPY_FILES = STEP_KEYS.indexOf('copiar_archivos');
const IDX_EXEC_CMD   = STEP_KEYS.indexOf('ejecutar_comando');

const CURSOR_GENERATE = STEP_COUNT;
const CURSOR_BACK     = STEP_COUNT + 1;
const CURSOR_EXECUTE  = STEP_COUNT + 2;

const NUBEPRINT_OPTIONS = ['Instalar NubePrint', 'Configurar NubePrint'];
const DRIVER_OPTIONS    = ['Windows 11', 'Windows 10', 'Windows 8.1', 'Windows 7'];
const MAIN_OPTIONS      = ['Configurar carpeta compartida', 'Instalador NubePrint', 'Instalar driver universal'];

const HINT_SELECT = '  Flechas: mover   Enter: seleccionar   Q: volver';

// ── Application state ─────────────────────────────────────────────────────────
const state = {
  screen:          'login',
  cursor:          0,
  token:           sessionStorage.getItem('opt_token') || '',
  loginField:      0,
  username:        '',
  password:        '',
  loginError:      '',
  loginPending:    false,
  stepEnabled:     STEP_KEYS.map(() => true),
  formStep:        0,
  formValues:      {},
  messageText:     '',
  messageSuccess:  true,
  spinnerIndex:    0,
  progressPercent: 0,
  progressText:    '',
};

let progressTimer = null;

// ── Progress helpers ──────────────────────────────────────────────────────────
function startProgress(text, durationMs) {
  state.screen          = 'progress';
  state.progressText    = text;
  state.spinnerIndex    = 0;
  state.progressPercent = 0;
  if (progressTimer) clearInterval(progressTimer);
  const totalSteps = durationMs / 80;
  let step = 0;
  progressTimer = setInterval(() => {
    step++;
    state.spinnerIndex    = step % SPINNER.length;
    state.progressPercent = Math.min(98, (step / totalSteps) * 100);
    draw();
  }, 80);
  draw();
}

function finishProgress(success, text) {
  if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
  state.progressPercent = 100;
  draw();
  setTimeout(() => {
    state.messageSuccess = success;
    state.messageText    = text;
    state.screen         = 'msg';
    draw();
  }, 300);
}

// ── Form field definitions ────────────────────────────────────────────────────
function getFormFields() {
  const fields = [
    { key: 'nombre', label: 'Nombre de la carpeta', defaultValue: 'Escaner' },
    { key: 'ruta',   label: 'Ruta destino         ', defaultValue: 'C:' },
  ];
  if (state.stepEnabled[IDX_COPY_FILES]) {
    fields.push({ key: 'origen',  label: 'Ruta origen archivos ', defaultValue: 'C:\\origen' });
    fields.push({ key: 'destino', label: 'Ruta destino archivos', defaultValue: 'D:\\backup' });
  }
  if (state.stepEnabled[IDX_EXEC_CMD]) {
    fields.push({ key: 'desc', label: 'Descripcion comando  ', defaultValue: 'Comando' });
    fields.push({ key: 'cmd',  label: 'Comando a ejecutar   ', defaultValue: 'echo ok' });
  }
  return fields;
}

// ── Render primitives ─────────────────────────────────────────────────────────
const escapeHtml = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function padEnd(text, width) {
  const str = String(text);
  return str.length >= width ? str.slice(0, width) : str + ' '.repeat(width - str.length);
}

function blueSpan(text, width) {
  return `<span class="blue" style="width:${width}ch">${escapeHtml(padEnd(text, width))}</span>`;
}

function highlightSpan(text, width) {
  return `<span class="selected" style="width:${width}ch">${escapeHtml(padEnd(text, width))}</span>`;
}

function rowDiv(...parts) {
  return `<div class="row">${parts.join('')}</div>`;
}

function emptyRow() {
  return `<div style="height:1.5em; margin-left:2ch"></div>`;
}

function openBox() {
  return emptyRow() + '<div class="box" style="margin-left:2ch">';
}

function closeBox() {
  return '</div>' + emptyRow();
}

function versionRow() {
  const label = VERSION + '  ';
  return boxRow(padEnd('', BOX_WIDTH - label.length) + label);
}

function boxRow(text, highlighted = false) {
  const content = padEnd(text || '', BOX_WIDTH);
  if (highlighted) return rowDiv(blueSpan(' ', 1), highlightSpan(content, BOX_WIDTH), blueSpan(' ', 1));
  return rowDiv(blueSpan(' ' + content + ' ', BOX_WIDTH + 2));
}

function divider() {
  return rowDiv(blueSpan('─'.repeat(BOX_WIDTH + 2), BOX_WIDTH + 2));
}

function menuRow(option, isSelected) {
  const prefix = isSelected ? ' >  ' : '     ';
  return boxRow(prefix + option, isSelected);
}

// ── Carpeta action button rows ────────────────────────────────────────────────
function actionButtonsRow(generateHighlighted, backHighlighted) {
  const generateLabel = '[ CREAR Y DESCARGAR .BAT ]';
  const backLabel     = '[ VOLVER AL MENU ]';
  return rowDiv(
    blueSpan('   ', 3),
    (generateHighlighted ? highlightSpan : blueSpan)(generateLabel, 26),
    blueSpan('    ', 4),
    (backHighlighted ? highlightSpan : blueSpan)(backLabel, 18),
    blueSpan('     ', 5)
  );
}

function executeButtonRow(highlighted) {
  const label = '[ EJECUTAR AHORA ]';
  return rowDiv(
    blueSpan(' '.repeat(19), 19),
    (highlighted ? highlightSpan : blueSpan)(label, 18),
    blueSpan(' '.repeat(19), 19)
  );
}

function backButtonRow(highlighted) {
  const label = '[ VOLVER AL MENU ]';
  return rowDiv(
    blueSpan(' '.repeat(33), 33),
    (highlighted ? highlightSpan : blueSpan)(label, 18),
    blueSpan('     ', 5)
  );
}

// ── Screen renderers ──────────────────────────────────────────────────────────
function drawLogin() {
  let html = openBox();
  html += versionRow();
  html += boxRow(padEnd('                    OPTIMIZALO', BOX_WIDTH));
  html += boxRow('');
  html += divider();
  html += boxRow('');
  html += boxRow('  Introduce tus credenciales:');
  html += boxRow('');
  html += boxRow('  Usuario:    ' + state.username + (state.loginField === 0 ? '█' : ''));
  html += boxRow('  Contrasena: ' + '•'.repeat(state.password.length) + (state.loginField === 1 ? '█' : ''));
  html += boxRow('');
  if (state.loginError)   html += boxRow('  * ' + state.loginError);
  if (state.loginPending) html += boxRow('  Iniciando sesion...');
  html += closeBox();
  return html;
}

function drawMain() {
  let html = openBox();
  html += versionRow();
  html += boxRow(padEnd('                MENU PRINCIPAL', BOX_WIDTH));
  html += boxRow('');
  html += divider();
  html += boxRow('');
  MAIN_OPTIONS.forEach((option, i) => { html += menuRow(option, state.cursor === i); });
  html += boxRow('');
  html += divider();
  html += boxRow('  Flechas: mover   Enter: seleccionar   Q: salir');
  html += boxRow('');
  html += closeBox();
  return html;
}

function drawCarpeta() {
  let html = openBox();
  html += versionRow();
  html += boxRow(padEnd('          CONFIGURAR CARPETA COMPARTIDA', BOX_WIDTH));
  html += boxRow('');
  html += divider();
  html += boxRow('');
  for (let i = 0; i < STEP_COUNT; i++) {
    const checkbox = state.stepEnabled[i] ? '[v]' : '[ ]';
    html += menuRow(checkbox + '   ' + STEP_LABELS[i], state.cursor === i);
  }
  html += boxRow('');
  html += divider();
  html += boxRow(state.cursor < STEP_COUNT ? '  ' + STEP_DESCS[state.cursor] : '');
  html += divider();
  html += boxRow('  Flechas: mover   Espacio: marcar   Q: volver');
  html += boxRow('');
  html += actionButtonsRow(state.cursor === CURSOR_GENERATE, state.cursor === CURSOR_BACK);
  html += executeButtonRow(state.cursor === CURSOR_EXECUTE);
  html += boxRow('');
  html += closeBox();
  return html;
}

function drawSimpleMenu(title, options, backCursorIndex) {
  let html = openBox();
  html += versionRow();
  html += boxRow(padEnd(title, BOX_WIDTH));
  html += boxRow('');
  html += divider();
  html += boxRow('');
  options.forEach((option, i) => { html += menuRow(option, state.cursor === i); });
  html += boxRow('');
  html += divider();
  html += boxRow(HINT_SELECT);
  html += boxRow('');
  html += backButtonRow(state.cursor === backCursorIndex);
  html += boxRow('');
  html += closeBox();
  return html;
}

function drawNubeprint() {
  return drawSimpleMenu('              INSTALADOR NUBEPRINT', NUBEPRINT_OPTIONS, NUBEPRINT_OPTIONS.length);
}

function drawDriver() {
  return drawSimpleMenu('            INSTALAR DRIVER UNIVERSAL', DRIVER_OPTIONS, DRIVER_OPTIONS.length);
}

function drawForm() {
  const fields = getFormFields();
  let html = openBox();
  html += versionRow();
  html += boxRow(padEnd('          CONFIGURAR CARPETA COMPARTIDA', BOX_WIDTH));
  html += boxRow('');
  html += boxRow('  Rellena los datos:');
  html += boxRow('');
  html += divider();
  html += boxRow('');
  for (let i = 0; i < state.formStep && i < fields.length; i++) {
    const field = fields[i];
    html += boxRow('  ' + field.label + ': ' + (state.formValues[field.key] || field.defaultValue));
  }
  if (state.formStep < fields.length) {
    const field = fields[state.formStep];
    html += boxRow('  ' + field.label + ': ' + (state.formValues[field.key] || '') + '█');
  }
  html += boxRow('');
  html += divider();
  html += boxRow('  Enter: confirmar   vacio = valor por defecto');
  html += boxRow('');
  html += closeBox();
  return html;
}

function drawMsg() {
  let html = openBox();
  html += versionRow();
  html += boxRow(state.messageSuccess ? '  [OK]  Operacion completada.' : '  [!]   Atencion:');
  html += boxRow('');
  html += boxRow('  ' + state.messageText);
  html += boxRow('');
  html += divider();
  html += boxRow('  Presiona Enter o Espacio para volver');
  html += boxRow('');
  html += closeBox();
  return html;
}

function drawProgress() {
  const spinner  = SPINNER[state.spinnerIndex % SPINNER.length];
  const pct      = Math.round(state.progressPercent);
  const barWidth = BOX_WIDTH - 9;
  const filled   = Math.round((pct / 100) * barWidth);
  const bar      = '█'.repeat(filled) + '░'.repeat(barWidth - filled);
  let html = openBox();
  html += versionRow();
  html += boxRow('  ' + state.progressText);
  html += boxRow('');
  html += boxRow('  [' + spinner + ']  Espera un momento...');
  html += boxRow('');
  html += boxRow('  [' + bar + '] ' + padEnd(pct + '%', 4));
  html += boxRow('');
  html += closeBox();
  return html;
}

const SCREEN_RENDERERS = {
  login:     drawLogin,
  main:      drawMain,
  carpeta:   drawCarpeta,
  nubeprint: drawNubeprint,
  driver:    drawDriver,
  form:      drawForm,
  msg:       drawMsg,
  progress:  drawProgress,
};

function draw() {
  const terminal = document.getElementById('terminal');
  const renderer = SCREEN_RENDERERS[state.screen];
  if (renderer) terminal.innerHTML = renderer();
}

// ── Actions ───────────────────────────────────────────────────────────────────
function navigateTo(screen, cursor = 0) {
  state.screen = screen;
  state.cursor = cursor;
  draw();
}

function logout() {
  sessionStorage.removeItem('opt_token');
  state.token      = '';
  state.screen     = 'login';
  state.loginField = 0;
  state.username   = '';
  state.password   = '';
  state.loginError = '';
  draw();
}

function buildStepParams(stepType, { nombre, ruta, fullPath, values }) {
  switch (stepType) {
    case 'crear_carpeta':    return { nombre, ruta };
    case 'compartir_red':    return { nombre_compartido: nombre, ruta_completa: fullPath };
    case 'visible_red':      return {};
    case 'acceso_directo':   return { nombre, ruta_completa: fullPath };
    case 'copiar_archivos':  return { origen: values.origen, destino: values.destino };
    case 'ejecutar_comando': return { descripcion: values.desc, comando: values.cmd };
    default:                 return {};
  }
}

function buildBatPayload() {
  const fields = getFormFields();
  const values = {};
  fields.forEach(field => { values[field.key] = state.formValues[field.key] || field.defaultValue; });

  const { nombre, ruta } = values;
  const fullPath = ruta + '\\' + nombre;
  const steps = [];

  for (let i = 0; i < STEP_COUNT; i++) {
    if (!state.stepEnabled[i]) continue;
    const stepType = STEP_KEYS[i];
    steps.push({ type: stepType, params: buildStepParams(stepType, { nombre, ruta, fullPath, values }) });
  }
  return { nombre, steps };
}

async function doLogin() {
  if (state.loginPending) return;
  state.loginPending = true;
  state.loginError   = '';
  draw();
  try {
    const response = await fetch(AUTH_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ username: state.username, password: state.password }),
    });
    const data = await response.json();
    if (response.ok) {
      state.token = data.token;
      sessionStorage.setItem('opt_token', state.token);
      navigateTo('main');
    } else {
      state.loginError = data.error || 'Credenciales incorrectas';
      state.loginField = 0;
      state.username   = '';
      state.password   = '';
    }
  } catch (err) {
    state.loginError = 'Error de conexion';
  }
  state.loginPending = false;
  draw();
}

async function doGenerate() {
  const payload = buildBatPayload();
  startProgress('Generando script .bat...', 4000);
  try {
    const response = await fetch(API_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Token': state.token },
      body:    JSON.stringify(payload),
    });
    if (response.ok) {
      const blob         = await response.blob();
      const objectUrl    = URL.createObjectURL(blob);
      const downloadLink = document.createElement('a');
      downloadLink.href     = objectUrl;
      downloadLink.download = payload.nombre.replace(/\s+/g, '_') + '.bat';
      downloadLink.click();
      URL.revokeObjectURL(objectUrl);
      finishProgress(true, 'Archivo descargado: ' + payload.nombre + '.bat');
    } else {
      const data = await response.json().catch(() => ({ error: 'Error' }));
      finishProgress(false, data.error || 'Error al generar');
    }
  } catch (err) {
    finishProgress(false, 'Error de conexion');
  }
}

// ── Key handlers ──────────────────────────────────────────────────────────────
function navigateList(e, maxIndex) {
  if (e.key === 'ArrowUp')   { if (state.cursor > 0)        state.cursor--; draw(); return true; }
  if (e.key === 'ArrowDown') { if (state.cursor < maxIndex) state.cursor++; draw(); return true; }
  return false;
}

function handleLogin(e) {
  if (state.loginPending) return;
  if (e.key === 'Tab')       { state.loginField = 1 - state.loginField; draw(); return; }
  if (e.key === 'Enter')     { if (state.loginField === 0) { state.loginField = 1; draw(); } else doLogin(); return; }
  if (e.key === 'Backspace') {
    if (state.loginField === 0) state.username = state.username.slice(0, -1);
    else                        state.password = state.password.slice(0, -1);
    draw();
    return;
  }
  if (e.key.length === 1) {
    if (state.loginField === 0) state.username += e.key;
    else                        state.password += e.key;
    draw();
  }
}

function handleMain(e) {
  if (navigateList(e, MAIN_OPTIONS.length - 1)) return;
  if (e.key === 'Enter') {
    const destinations = ['carpeta', 'nubeprint', 'driver'];
    if (destinations[state.cursor]) navigateTo(destinations[state.cursor]);
    return;
  }
  if (e.key === 'q' || e.key === 'Q') logout();
}

function handleCarpeta(e) {
  if (e.key === 'ArrowUp') {
    if      (state.cursor === CURSOR_EXECUTE)                                     state.cursor = CURSOR_GENERATE;
    else if (state.cursor === CURSOR_GENERATE || state.cursor === CURSOR_BACK)    state.cursor = STEP_COUNT - 1;
    else if (state.cursor > 0)                                                    state.cursor--;
    draw(); return;
  }
  if (e.key === 'ArrowDown') {
    if      (state.cursor < STEP_COUNT - 1)                                       state.cursor++;
    else if (state.cursor === STEP_COUNT - 1)                                     state.cursor = CURSOR_GENERATE;
    else if (state.cursor === CURSOR_GENERATE || state.cursor === CURSOR_BACK)    state.cursor = CURSOR_EXECUTE;
    draw(); return;
  }
  if (e.key === 'ArrowLeft')  { if (state.cursor === CURSOR_BACK)     state.cursor = CURSOR_GENERATE; draw(); return; }
  if (e.key === 'ArrowRight') { if (state.cursor === CURSOR_GENERATE) state.cursor = CURSOR_BACK;     draw(); return; }
  if (e.key === ' ' || e.key === 'Enter') {
    if (state.cursor < STEP_COUNT) {
      state.stepEnabled[state.cursor] = !state.stepEnabled[state.cursor];
      draw(); return;
    }
    if (state.cursor === CURSOR_BACK) { navigateTo('main'); return; }
    if (state.cursor === CURSOR_GENERATE && state.stepEnabled.some(Boolean)) {
      state.formStep = 0; state.formValues = {}; navigateTo('form'); return;
    }
    if (state.cursor === CURSOR_EXECUTE) {
      state.messageSuccess = false;
      state.messageText    = 'Solo disponible via PowerShell en Windows.';
      navigateTo('msg');
    }
  }
  if (e.key === 'q' || e.key === 'Q') navigateTo('main');
}

function handleNubeprint(e) {
  const backIndex = NUBEPRINT_OPTIONS.length;
  if (navigateList(e, backIndex)) return;
  if (e.key === 'Enter') {
    if (state.cursor === 0) {
      startProgress('Descargando NubePrint CPM...', 12000);
      window.open('https://zero.nubeprint.com/download/cpms/Nubeprint%20CPM.msi', '_blank');
      setTimeout(() => finishProgress(true, 'Descarga iniciada: Nubeprint CPM.msi'), 2500);
    } else if (state.cursor === 1) {
      state.messageSuccess = false;
      state.messageText    = 'Configuracion NubePrint: Proximamente...';
      navigateTo('msg');
    } else {
      navigateTo('main', 1);
    }
  }
  if (e.key === 'q' || e.key === 'Q') navigateTo('main', 1);
}

function handleDriver(e) {
  const backIndex = DRIVER_OPTIONS.length;
  if (navigateList(e, backIndex)) return;
  if (e.key === 'Enter') {
    if (state.cursor < DRIVER_OPTIONS.length) {
      startProgress('Descargando Driver Universal HP ' + DRIVER_OPTIONS[state.cursor] + '...', 20000);
      window.open('https://ftp.hp.com/pub/softlib/software13/printers/UPD/upd-pcl6-win10-x64-8.2.0.26778.zip', '_blank');
      setTimeout(() => finishProgress(true, 'Descarga iniciada: HP_UPD_PCL6.zip'), 2500);
    } else {
      navigateTo('main', 2);
    }
  }
  if (e.key === 'q' || e.key === 'Q') navigateTo('main', 2);
}

function handleForm(e) {
  if (e.key === 'q' || e.key === 'Q') { navigateTo('carpeta'); return; }
  const fields = getFormFields();
  if (state.formStep >= fields.length) return;
  const field = fields[state.formStep];
  if (e.key === 'Enter') {
    state.formValues[field.key] = state.formValues[field.key] || field.defaultValue;
    state.formStep++;
    if (state.formStep >= fields.length) doGenerate();
    else draw();
    return;
  }
  if (e.key === 'Backspace') { state.formValues[field.key] = (state.formValues[field.key] || '').slice(0, -1); draw(); return; }
  if (e.key.length === 1)    { state.formValues[field.key] = (state.formValues[field.key] || '') + e.key; draw(); }
}

function handleMsg(e) {
  if (e.key === 'Enter' || e.key === ' ' || e.key === 'q' || e.key === 'Q') navigateTo('main');
}

function handleProgress(e) {
  if (e.key === 'q' || e.key === 'Q') {
    if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
    navigateTo('main');
  }
}

const KEY_HANDLERS = {
  login:     handleLogin,
  main:      handleMain,
  carpeta:   handleCarpeta,
  nubeprint: handleNubeprint,
  driver:    handleDriver,
  form:      handleForm,
  msg:       handleMsg,
  progress:  handleProgress,
};

document.getElementById('terminal').addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  e.preventDefault();
  const handler = KEY_HANDLERS[state.screen];
  if (handler) handler(e);
});

if (state.token) state.screen = 'main';
draw();
document.getElementById('terminal').focus();
</script>
</body>
</html>
