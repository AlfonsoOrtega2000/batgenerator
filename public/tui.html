<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimizalo — Menu</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0C0C0C;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Consolas', 'Courier New', monospace;
  font-size: 15px;
  overflow-x: auto;
}
#term { display: flex; flex-direction: column; outline: none; cursor: default; user-select: none; }
.row  { display: flex; align-items: stretch; flex-shrink: 0; }
.b    { background: #0037DA; color: #fff; white-space: pre; overflow: hidden; flex-shrink: 0; line-height: 1.5; }
.h    { background: #3B78FF; color: #fff; font-weight: bold; white-space: pre; overflow: hidden; flex-shrink: 0; line-height: 1.5; }
@media (max-width: 600px) { body { font-size: 10px; } }
</style>
</head>
<body>
<div id="term" tabindex="0"></div>
<script>
const W        = 54;
const IND      = 2;
const API_URL  = '/api/generate';
const AUTH_URL = '/api/auth';

const S = {
  screen: 'login',
  cursor: 0,
  token:  localStorage.getItem('opt_token') || '',
  lf: 0, user: '', pass: '', lerr: '', lbusy: false,
  chk: [1,1,1,1,1,1],
  formStage: 0, formVals: {},
  msgText: '', msgOk: true,
};

const KEYS   = ['crear_carpeta','compartir_red','visible_red','acceso_directo','copiar_archivos','ejecutar_comando'];
const LABELS = ['Crear carpeta','Compartir en red','Visibilidad en red','Acceso directo escritorio','Copiar archivos','Ejecutar comando'];
const DESCS  = ['Crea la carpeta en el disco si no existe ya',
                'Comparte la carpeta en la red local (acceso total)',
                'Activa el descubrimiento de red y uso compartido',
                'Crea un acceso directo a la carpeta en el escritorio',
                'Copia archivos de una ruta origen a una ruta destino',
                'Ejecuta un comando personalizado de Windows'];
const CN     = KEYS.length;
const BTN    = CN, BACK_C = CN + 1, EXEC_C = CN + 2;

const NP_OPT   = ['Instalar NubePrint', 'Configurar NubePrint'];
const DRV_OPT  = ['Windows 11', 'Windows 10', 'Windows 8.1', 'Windows 7'];
const MAIN_OPT = ['Configurar carpeta compartida', 'Instalador NubePrint', 'Instalar driver universal'];

// ── Render primitives ─────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function pad(s, n) {
  s = String(s);
  return s.length >= n ? s.slice(0, n) : s + ' '.repeat(n - s.length);
}

// A blue span of exactly n chars width
function bs(text, n) {
  return `<span class="b" style="width:${n}ch">${esc(pad(text, n))}</span>`;
}

// A highlight span of exactly n chars width
function hs(text, n) {
  return `<span class="h" style="width:${n}ch">${esc(pad(text, n))}</span>`;
}

// A transparent indent span
function ind() { return `<span style="width:${IND}ch"></span>`; }

// Wrap spans in a row div
function row(...parts) {
  return `<div class="row">${ind()}${parts.join('')}</div>`;
}

// Empty row (no box)
function erow() { return `<div style="height:1.5em"></div>`; }

// Full-width blue line: | padded content |
function brow(text, hl) {
  const c = pad(text || '', W);
  if (hl) return row(bs('|', 1), hs(c, W), bs('|', 1));
  return row(bs('|' + c + '|', W + 2));
}

// Border: +----+
function bord() { return row(bs('+' + '-'.repeat(W) + '+', W + 2)); }

// ── Carpeta button rows ───────────────────────────────────────────────────────
// | 2sp [b1=26] 4sp [b2=18] 4sp |   total content = 3+26+4+18+5 = 56 = W+2
function btnRow(b1HL, b2HL) {
  const b1 = '[ CREAR Y DESCARGAR .BAT ]';
  const b2 = '[ VOLVER AL MENU ]';
  return row(
    bs('|  ', 3),
    (b1HL ? hs : bs)(b1, 26),
    bs('    ', 4),
    (b2HL ? hs : bs)(b2, 18),
    bs('    |', 5)
  );
}

// | 18sp [b3=18] 18sp |   total = 19+18+19 = 56 = W+2
function execRow(execHL) {
  const b3 = '[ EJECUTAR AHORA ]';
  return row(
    bs('|' + ' '.repeat(18), 19),
    (execHL ? hs : bs)(b3, 18),
    bs(' '.repeat(18) + '|', 19)
  );
}

// | 32sp [bk=18] 4sp |   total = 33+18+5 = 56 = W+2
function backRow(backHL) {
  const bk = '[ VOLVER AL MENU ]';
  return row(
    bs('|' + ' '.repeat(32), 33),
    (backHL ? hs : bs)(bk, 18),
    bs('    |', 5)
  );
}

// ── Screens ───────────────────────────────────────────────────────────────────
function drawLogin() {
  let h = erow() + bord();
  h += brow('');
  h += brow(pad('                    OPTIMIZALO', W));
  h += brow('');
  h += bord();
  h += brow('');
  h += brow('  Introduce tus credenciales:');
  h += brow('');
  h += brow('  Usuario:    ' + S.user + (S.lf === 0 ? '█' : ''));
  h += brow('  Contrasena: ' + '•'.repeat(S.pass.length) + (S.lf === 1 ? '█' : ''));
  h += brow('');
  if (S.lerr)  h += brow('  * ' + S.lerr);
  if (S.lbusy) h += brow('  Iniciando sesion...');
  h += bord();
  h += erow();
  return h;
}

function drawMain() {
  let h = erow() + bord();
  h += brow('');
  h += brow(pad('                MENU PRINCIPAL', W));
  h += brow('');
  h += bord();
  h += brow('');
  MAIN_OPT.forEach((o, i) => h += brow((S.cursor === i ? ' >  ' : '     ') + o, S.cursor === i));
  h += brow('');
  h += bord();
  h += brow('  Flechas: mover   Enter: seleccionar   Q: salir');
  h += brow('');
  h += bord();
  h += erow();
  return h;
}

function drawCarpeta() {
  let h = erow() + bord();
  h += brow('');
  h += brow(pad('          CONFIGURAR CARPETA COMPARTIDA', W));
  h += brow('');
  h += bord();
  h += brow('');
  for (let i = 0; i < CN; i++) {
    const cb = S.chk[i] ? '[v]' : '[ ]';
    h += brow((S.cursor === i ? ' >  ' : '     ') + cb + '   ' + LABELS[i], S.cursor === i);
  }
  h += brow('');
  h += bord();
  h += brow(S.cursor < CN ? '  ' + DESCS[S.cursor] : '');
  h += bord();
  h += brow('  Flechas: mover   Espacio: marcar   Q: volver');
  h += brow('');
  h += btnRow(S.cursor === BTN, S.cursor === BACK_C);
  h += execRow(S.cursor === EXEC_C);
  h += brow('');
  h += bord();
  h += erow();
  return h;
}

function drawNubeprint() {
  const BACK = NP_OPT.length;
  let h = erow() + bord();
  h += brow('');
  h += brow(pad('              INSTALADOR NUBEPRINT', W));
  h += brow('');
  h += bord();
  h += brow('');
  NP_OPT.forEach((o, i) => h += brow((S.cursor === i ? ' >  ' : '     ') + o, S.cursor === i));
  h += brow('');
  h += bord();
  h += brow('  Flechas: mover   Enter: seleccionar   Q: volver');
  h += brow('');
  h += backRow(S.cursor === BACK);
  h += brow('');
  h += bord();
  h += erow();
  return h;
}

function drawDriver() {
  const BACK = DRV_OPT.length;
  let h = erow() + bord();
  h += brow('');
  h += brow(pad('            INSTALAR DRIVER UNIVERSAL', W));
  h += brow('');
  h += bord();
  h += brow('');
  DRV_OPT.forEach((o, i) => h += brow((S.cursor === i ? ' >  ' : '     ') + o, S.cursor === i));
  h += brow('');
  h += bord();
  h += brow('  Flechas: mover   Enter: seleccionar   Q: volver');
  h += brow('');
  h += backRow(S.cursor === BACK);
  h += brow('');
  h += bord();
  h += erow();
  return h;
}

function getFormFields() {
  const f = [
    { key: 'nombre', label: 'Nombre de la carpeta', def: 'Escaner' },
    { key: 'ruta',   label: 'Ruta destino         ', def: 'C:' },
  ];
  if (S.chk[KEYS.indexOf('copiar_archivos')]) {
    f.push({ key: 'origen',  label: 'Ruta origen archivos ', def: 'C:\\origen' });
    f.push({ key: 'destino', label: 'Ruta destino archivos', def: 'D:\\backup' });
  }
  if (S.chk[KEYS.indexOf('ejecutar_comando')]) {
    f.push({ key: 'desc', label: 'Descripcion comando  ', def: 'Comando' });
    f.push({ key: 'cmd',  label: 'Comando a ejecutar   ', def: 'echo ok' });
  }
  return f;
}

function drawForm() {
  const fields = getFormFields();
  let h = erow() + bord();
  h += brow('');
  h += brow(pad('          CONFIGURAR CARPETA COMPARTIDA', W));
  h += brow('');
  h += brow('  Rellena los datos:');
  h += brow('');
  h += bord();
  h += brow('');
  for (let i = 0; i < S.formStage && i < fields.length; i++) {
    const f = fields[i];
    h += brow('  ' + f.label + ': ' + (S.formVals[f.key] || f.def));
  }
  if (S.formStage < fields.length) {
    const f = fields[S.formStage];
    h += brow('  ' + f.label + ': ' + (S.formVals[f.key] || '') + '█');
  }
  h += brow('');
  h += bord();
  h += brow('  Enter: confirmar   vacio = valor por defecto');
  h += brow('');
  h += bord();
  h += erow();
  return h;
}

function drawMsg() {
  let h = erow() + bord();
  h += brow('');
  h += brow(S.msgOk ? '  [OK]  Operacion completada.' : '  [!]   Atencion:');
  h += brow('');
  h += brow('  ' + S.msgText);
  h += brow('');
  h += bord();
  h += brow('  Presiona Enter o Espacio para volver');
  h += brow('');
  h += bord();
  h += erow();
  return h;
}

function draw() {
  const t = document.getElementById('term');
  switch (S.screen) {
    case 'login':     t.innerHTML = drawLogin();     break;
    case 'main':      t.innerHTML = drawMain();      break;
    case 'carpeta':   t.innerHTML = drawCarpeta();   break;
    case 'nubeprint': t.innerHTML = drawNubeprint(); break;
    case 'driver':    t.innerHTML = drawDriver();    break;
    case 'form':      t.innerHTML = drawForm();      break;
    case 'msg':       t.innerHTML = drawMsg();       break;
  }
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function doLogin() {
  if (S.lbusy) return;
  S.lbusy = true; S.lerr = ''; draw();
  try {
    const r = await fetch(AUTH_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: S.user, password: S.pass }),
    });
    const d = await r.json();
    if (r.ok) {
      S.token = d.token;
      localStorage.setItem('opt_token', S.token);
      S.screen = 'main'; S.cursor = 0;
    } else {
      S.lerr = d.error || 'Credenciales incorrectas';
      S.lf = 0; S.user = ''; S.pass = '';
    }
  } catch { S.lerr = 'Error de conexion'; }
  S.lbusy = false; draw();
}

async function doGenerate() {
  const fields = getFormFields();
  const vals   = {};
  fields.forEach(f => { vals[f.key] = S.formVals[f.key] || f.def; });

  const nombre = vals.nombre;
  const ruta   = vals.ruta;
  const full   = ruta + '\\' + nombre;
  const steps  = [];

  for (let i = 0; i < CN; i++) {
    if (!S.chk[i]) continue;
    const t = KEYS[i];
    let params = {};
    switch (t) {
      case 'crear_carpeta':    params = { nombre, ruta }; break;
      case 'compartir_red':    params = { nombre_compartido: nombre, ruta_completa: full }; break;
      case 'visible_red':      params = {}; break;
      case 'acceso_directo':   params = { nombre, ruta_completa: full }; break;
      case 'copiar_archivos':  params = { origen: vals.origen, destino: vals.destino }; break;
      case 'ejecutar_comando': params = { descripcion: vals.desc, comando: vals.cmd }; break;
    }
    steps.push({ type: t, params });
  }

  S.screen = 'msg'; S.msgOk = false; S.msgText = 'Generando script .bat...'; draw();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Auth-Token': S.token },
      body: JSON.stringify({ nombre, steps }),
    });
    if (res.ok) {
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = nombre.replace(/\s+/g, '_') + '.bat'; a.click();
      URL.revokeObjectURL(url);
      S.msgOk = true; S.msgText = 'Archivo descargado: ' + nombre + '.bat';
    } else {
      const d = await res.json().catch(() => ({ error: 'Error' }));
      S.msgOk = false; S.msgText = d.error || 'Error al generar';
    }
  } catch { S.msgOk = false; S.msgText = 'Error de conexion'; }
  draw();
}

// ── Key handlers ──────────────────────────────────────────────────────────────
function handleLogin(e) {
  if (S.lbusy) return;
  if (e.key === 'Tab')       { S.lf = 1 - S.lf; draw(); return; }
  if (e.key === 'Enter')     { if (S.lf === 0) { S.lf = 1; draw(); } else doLogin(); return; }
  if (e.key === 'Backspace') { if (S.lf === 0) S.user = S.user.slice(0,-1); else S.pass = S.pass.slice(0,-1); draw(); return; }
  if (e.key.length === 1)    { if (S.lf === 0) S.user += e.key; else S.pass += e.key; draw(); }
}

function handleMain(e) {
  const max = MAIN_OPT.length - 1;
  if (e.key === 'ArrowUp')   { if (S.cursor > 0)  S.cursor--; draw(); return; }
  if (e.key === 'ArrowDown') { if (S.cursor < max) S.cursor++; draw(); return; }
  if (e.key === 'Enter') {
    if (S.cursor === 0) { S.screen = 'carpeta';   S.cursor = 0; }
    if (S.cursor === 1) { S.screen = 'nubeprint'; S.cursor = 0; }
    if (S.cursor === 2) { S.screen = 'driver';    S.cursor = 0; }
    draw();
  }
}

function handleCarpeta(e) {
  if (e.key === 'ArrowUp') {
    if      (S.cursor === EXEC_C)                     S.cursor = BTN;
    else if (S.cursor === BTN || S.cursor === BACK_C)  S.cursor = CN - 1;
    else if (S.cursor > 0)                            S.cursor--;
    draw(); return;
  }
  if (e.key === 'ArrowDown') {
    if      (S.cursor < CN - 1)                       S.cursor++;
    else if (S.cursor === CN - 1)                     S.cursor = BTN;
    else if (S.cursor === BTN || S.cursor === BACK_C)  S.cursor = EXEC_C;
    draw(); return;
  }
  if (e.key === 'ArrowLeft')  { if (S.cursor === BACK_C) S.cursor = BTN;    draw(); return; }
  if (e.key === 'ArrowRight') { if (S.cursor === BTN)    S.cursor = BACK_C; draw(); return; }
  if (e.key === ' ' || e.key === 'Enter') {
    if (S.cursor < CN) { S.chk[S.cursor] = 1 - S.chk[S.cursor]; draw(); return; }
    if (S.cursor === BACK_C) { S.screen = 'main'; S.cursor = 0; draw(); return; }
    if (S.cursor === BTN && S.chk.some(v => v))
      { S.formStage = 0; S.formVals = {}; S.screen = 'form'; draw(); return; }
    if (S.cursor === EXEC_C)
      { S.msgOk = false; S.msgText = 'Solo disponible via PowerShell en Windows.'; S.screen = 'msg'; draw(); return; }
  }
  if (e.key === 'q' || e.key === 'Q') { S.screen = 'main'; S.cursor = 0; draw(); }
}

function handleNubeprint(e) {
  const BACK = NP_OPT.length;
  if (e.key === 'ArrowUp')   { if (S.cursor > 0)    S.cursor--; draw(); return; }
  if (e.key === 'ArrowDown') { if (S.cursor < BACK)  S.cursor++; draw(); return; }
  if (e.key === 'Enter') {
    if (S.cursor === 0) {
      window.open('https://zero.nubeprint.com/download/cpms/Nubeprint%20CPM.msi', '_blank');
      S.msgOk = true; S.msgText = 'Descarga iniciada en nueva pestana.'; S.screen = 'msg';
    } else if (S.cursor === 1) {
      S.msgOk = false; S.msgText = 'Configuracion NubePrint: Proximamente...'; S.screen = 'msg';
    } else {
      S.screen = 'main'; S.cursor = 1;
    }
    draw();
  }
  if (e.key === 'q' || e.key === 'Q') { S.screen = 'main'; S.cursor = 1; draw(); }
}

function handleDriver(e) {
  const BACK = DRV_OPT.length;
  if (e.key === 'ArrowUp')   { if (S.cursor > 0)    S.cursor--; draw(); return; }
  if (e.key === 'ArrowDown') { if (S.cursor < BACK)  S.cursor++; draw(); return; }
  if (e.key === 'Enter') {
    if (S.cursor < DRV_OPT.length) {
      window.open('https://ftp.hp.com/pub/softlib/software13/printers/UPD/upd-pcl6-win10-x64-8.2.0.26778.zip', '_blank');
      S.msgOk = true; S.msgText = 'Descarga iniciada en nueva pestana.'; S.screen = 'msg';
    } else {
      S.screen = 'main'; S.cursor = 2;
    }
    draw();
  }
  if (e.key === 'q' || e.key === 'Q') { S.screen = 'main'; S.cursor = 2; draw(); }
}

function handleForm(e) {
  const fields = getFormFields();
  if (S.formStage >= fields.length) return;
  const f = fields[S.formStage];
  if (e.key === 'Enter') {
    S.formVals[f.key] = S.formVals[f.key] || f.def;
    S.formStage++;
    if (S.formStage >= fields.length) doGenerate();
    else draw();
    return;
  }
  if (e.key === 'Backspace') { S.formVals[f.key] = (S.formVals[f.key] || '').slice(0,-1); draw(); return; }
  if (e.key.length === 1)    { S.formVals[f.key] = (S.formVals[f.key] || '') + e.key; draw(); }
}

function handleMsg(e) {
  if (e.key === 'Enter' || e.key === ' ') { S.screen = 'main'; S.cursor = 0; draw(); }
}

document.getElementById('term').addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  e.preventDefault();
  switch (S.screen) {
    case 'login':     handleLogin(e);     break;
    case 'main':      handleMain(e);      break;
    case 'carpeta':   handleCarpeta(e);   break;
    case 'nubeprint': handleNubeprint(e); break;
    case 'driver':    handleDriver(e);    break;
    case 'form':      handleForm(e);      break;
    case 'msg':       handleMsg(e);       break;
  }
});

if (S.token) S.screen = 'main';
draw();
document.getElementById('term').focus();
</script>
</body>
</html>
